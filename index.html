  html, body { margin: 0; height: 100%; background: ${a}; color: #C4CDDE;

  #cb-root { display: flex; height: 100vh; width: 100vw; }

  .cb-brand h1 { margin: 0; font-size: 17px; font-weight: 600; color: #E6ECF6; letter-spacing: 0; }
  .cb-brand p { margin: 0; font-size: 12.5px; color: rgba(196,205,222,0.55); }
  .cb-field { display: flex; flex-direction: column; gap: 8px; }
  .cb-field > label { font-size: 12px; color: rgba(196,205,222,0.6); font-weight: 500; }
  .cb-input, .cb-select-trigger, .cb-textarea {
    width: 100%; background: rgba(255,255,255,0.03); color: #DCE3EF;
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;

    font-family: 'JetBrains Mono', ui-monospace, monospace;
    transition: border-color 120ms ease, background 120ms ease; }
  .cb-input::placeholder, .cb-textarea::placeholder { color: rgba(196,205,222,0.32); }
  .cb-input:focus, .cb-textarea:focus,
  .cb-select-wrap.is-open .cb-select-trigger {
    border-color: rgba(74,157,253,0.55); background: rgba(74,157,253,0.05); }
  .cb-textarea { min-height: 260px; resize: vertical; line-height: 1.55; }

  /* Dropdown de linguagem (custom, sem a lista nativa feia do SO) */
  .cb-select-wrap { position: relative; }
  .cb-select-trigger { display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; text-align: left; }
  .cb-select-trigger .cb-chevron { width: 12px; height: 12px; flex-shrink: 0;
    color: #7A889F; transition: transform 160ms cubic-bezier(0.25,0.1,0.25,1); }
  .cb-select-wrap.is-open .cb-chevron { transform: rotate(180deg); }
  .cb-select-list { position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 60;
    background: rgba(18,26,44,0.98); backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.09); border-radius: 12px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45); padding: 5px; display: flex; flex-direction: column;
    gap: 2px; max-height: 320px; overflow-y: auto; }
  .cb-select-list[hidden] { display: none; }
  .cb-option { display: block; width: 100%; text-align: left; border: none; cursor: pointer;
    background: transparent; color: rgba(196,205,222,0.78); font-family: inherit;

  .cb-option:hover { background: rgba(255,255,255,0.05); color: #DCE3EF; }

  .cb-row { display: flex; gap: 16px; }
  .cb-row > .cb-field { flex: 1; }

    font-family: inherit; transition: background 120ms ease, color 120ms ease; }
  .cb-seg button:hover { color: #DCE3EF; }
  .cb-seg button.is-active { background: rgba(74,157,253,0.16); color: #9FCBFF; }
  .cb-toggle { display: flex; align-items: center; justify-content: space-between;

  .cb-toggle span { font-size: 13px; color: rgba(196,205,222,0.75); }
  .cb-switch { width: 40px; height: 23px; border-radius: 99px; background: rgba(255,255,255,0.1);
    position: relative; transition: background 140ms ease; flex-shrink: 0; }
  .cb-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 19px; height: 19px;

  .cb-toggle.is-on .cb-switch { background: ${e}; }
  .cb-toggle.is-on .cb-switch::after { transform: translateX(17px); background: #fff; }
  .cb-export { margin-top: 4px; width: 100%; border: none; border-radius: 13px; cursor: pointer;
    padding: 13px 0; font-size: 14px; font-weight: 600; font-family: inherit; color: #04101f;
    background: ${e}; transition: transform 120ms ease, filter 120ms ease, opacity 120ms ease; }
  .cb-export:hover { filter: brightness(1.06); }
  .cb-export:active { transform: scale(0.98); }

  .cb-hint { font-size: 11.5px; color: rgba(196,205,222,0.4); text-align: center; min-height: 15px; }
